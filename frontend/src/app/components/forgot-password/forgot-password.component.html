<div class="min-h-screen flex items-center justify-center px-4 relative overflow-hidden bg-slate-950">
  <!-- Glowing decorative orbs -->
  <div class="absolute top-1/4 left-1/4 w-80 h-80 bg-amber-500/10 rounded-full blur-3xl -z-10 animate-pulse"></div>
  <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-yellow-600/10 rounded-full blur-3xl -z-10 animate-pulse" style="animation-delay: 2s;"></div>

  <div class="w-full max-w-md p-8 rounded-2xl glass-panel shadow-2xl relative">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-amber-400 to-amber-200 bg-clip-text text-transparent">
        FLEXZONE
      </h1>
      <p class="text-amber-500 font-medium tracking-wide text-xs uppercase mt-1">Reset Password</p>
      
      <!-- Sub-headers for different steps -->
      <p *ngIf="step === 1" class="text-slate-400 text-sm mt-3">Enter your email address to find your account.</p>
      <p *ngIf="step === 2" class="text-slate-400 text-sm mt-3">Email verified! Please enter your new password below.</p>
      <p *ngIf="step === 3" class="text-slate-400 text-sm mt-3">Congratulations! Your password has been updated.</p>
    </div>

    <!-- Error Alert -->
    <div *ngIf="errorMessage" class="mb-5 p-3 rounded-lg bg-red-950/50 border border-red-500/30 text-red-400 text-xs text-center animate-shake">
      {{ errorMessage }}
    </div>

    <!-- STEP 1: Enter Email -->
    <form *ngIf="step === 1" (ngSubmit)="verifyEmail()" #emailForm="ngForm" class="space-y-5">
      <div>
        <label for="email" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Email Address</label>
        <input 
          type="email" 
          id="email" 
          name="email"
          [(ngModel)]="email" 
          required 
          email
          #emailInput="ngModel"
          class="w-full px-4 py-3 rounded-lg bg-slate-900/80 border border-slate-700 focus:border-amber-400 focus:ring-1 focus:ring-amber-400 text-slate-100 placeholder-slate-500 outline-none transition-all text-sm"
          placeholder="name@example.com"
        >
      </div>

      <button 
        type="submit" 
        [disabled]="!emailForm.form.valid || loading"
        class="w-full py-3 rounded-lg btn-gold font-bold transition-all flex items-center justify-center gap-2 text-sm disabled:opacity-50 disabled:cursor-not-allowed"
      >
        <svg *ngIf="loading" class="animate-spin h-5 w-5 text-slate-950" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span>{{ loading ? 'Verifying...' : 'Verify Email' }}</span>
      </button>
    </form>

    <!-- STEP 2: Reset Password -->
    <form *ngIf="step === 2" (ngSubmit)="resetPassword()" #resetForm="ngForm" class="space-y-5">
      <div>
        <label for="newPassword" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">New Password</label>
        <input 
          type="password" 
          id="newPassword" 
          name="newPassword"
          [(ngModel)]="newPassword" 
          required 
          minlength="6"
          #newPwdInput="ngModel"
          class="w-full px-4 py-3 rounded-lg bg-slate-900/80 border border-slate-700 focus:border-amber-400 focus:ring-1 focus:ring-amber-400 text-slate-100 placeholder-slate-500 outline-none transition-all text-sm"
          placeholder="At least 6 characters"
        >
      </div>

      <div>
        <label for="confirmPassword" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Confirm Password</label>
        <input 
          type="password" 
          id="confirmPassword" 
          name="confirmPassword"
          [(ngModel)]="confirmPassword" 
          required 
          #confirmPwdInput="ngModel"
          class="w-full px-4 py-3 rounded-lg bg-slate-900/80 border border-slate-700 focus:border-amber-400 focus:ring-1 focus:ring-amber-400 text-slate-100 placeholder-slate-500 outline-none transition-all text-sm"
          placeholder="Repeat new password"
        >
      </div>

      <button 
        type="submit" 
        [disabled]="!resetForm.form.valid || loading"
        class="w-full py-3 rounded-lg btn-gold font-bold transition-all flex items-center justify-center gap-2 text-sm disabled:opacity-50 disabled:cursor-not-allowed"
      >
        <svg *ngIf="loading" class="animate-spin h-5 w-5 text-slate-950" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span>{{ loading ? 'Updating...' : 'Update Password' }}</span>
      </button>
    </form>

    <!-- STEP 3: Success State -->
    <div *ngIf="step === 3" class="space-y-6 text-center">
      <div class="flex justify-center">
        <div class="w-16 h-16 rounded-full bg-emerald-950/50 border border-emerald-500/30 flex items-center justify-center text-emerald-400">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-8 h-8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
          </svg>
        </div>
      </div>
      
      <div class="p-3 rounded-lg bg-emerald-950/30 border border-emerald-500/10 text-emerald-400 text-xs text-center">
        {{ successMessage }}
      </div>

      <button 
        routerLink="/login"
        class="w-full py-3 rounded-lg btn-gold font-bold transition-all text-sm"
      >
        Return to Sign In
      </button>
    </div>

    <!-- Back to Login Link -->
    <div *ngIf="step !== 3" class="mt-8 text-center border-t border-slate-800 pt-6">
      <p class="text-slate-400 text-xs">
        Remembered your password? 
        <a routerLink="/login" class="text-amber-400 hover:text-amber-300 font-semibold transition-all">Sign in here</a>
      </p>
    </div>
  </div>
</div>
