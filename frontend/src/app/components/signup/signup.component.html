<div class="min-h-screen flex items-center justify-center px-4 relative overflow-hidden bg-slate-950">
  <div class="absolute top-1/4 left-1/4 w-80 h-80 bg-amber-500/10 rounded-full blur-3xl -z-10 animate-pulse"></div>
  <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-yellow-600/10 rounded-full blur-3xl -z-10 animate-pulse" style="animation-delay: 2s;"></div>

  <div class="w-full max-w-lg p-8 rounded-2xl glass-panel shadow-2xl relative my-8">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-amber-400 to-amber-200 bg-clip-text text-transparent">
        CREATE ACCOUNT
      </h1>
      <p class="text-amber-500 font-medium tracking-wide text-xs uppercase mt-1">FlexZone Asansol</p>
      <p class="text-slate-400 text-sm mt-3">Join us today to access schedules, trainers, and progress tracking.</p>
    </div>

    <!-- Notifications -->
    <div *ngIf="errorMessage" class="mb-5 p-3 rounded-lg bg-red-950/50 border border-red-500/30 text-red-400 text-xs text-center font-semibold">
      {{ errorMessage }}
    </div>
    <div *ngIf="successMessage" class="mb-5 p-3 rounded-lg bg-emerald-950/50 border border-emerald-500/30 text-emerald-400 text-xs text-center font-semibold">
      {{ successMessage }}
    </div>

    <form (ngSubmit)="onSubmit()" #signupForm="ngForm" class="space-y-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label for="fullName" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Full Name</label>
          <input 
            type="text" 
            id="fullName" 
            name="fullName"
            [(ngModel)]="user.fullName" 
            required 
            class="w-full px-4 py-3 rounded-lg bg-slate-900 border border-slate-700 focus:border-amber-400 focus:ring-1 focus:ring-amber-400 text-slate-100 placeholder-slate-500 outline-none transition-all text-sm"
            placeholder="John Doe"
          >
        </div>

        <div>
          <label for="email" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Email Address</label>
          <input 
            type="email" 
            id="email" 
            name="email"
            [(ngModel)]="user.email" 
            required 
            class="w-full px-4 py-3 rounded-lg bg-slate-900 border border-slate-700 focus:border-amber-400 focus:ring-1 focus:ring-amber-400 text-slate-100 placeholder-slate-500 outline-none transition-all text-sm"
            placeholder="john@example.com"
          >
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label for="username" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Username</label>
          <input 
            type="text" 
            id="username" 
            name="username"
            [(ngModel)]="user.username" 
            required 
            class="w-full px-4 py-3 rounded-lg bg-slate-900 border border-slate-700 focus:border-amber-400 focus:ring-1 focus:ring-amber-400 text-slate-100 placeholder-slate-500 outline-none transition-all text-sm"
            placeholder="johndoe"
          >
        </div>

        <div>
          <label for="password" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Password</label>
          <div class="relative">
            <input 
              [type]="showPassword ? 'text' : 'password'" 
              id="password" 
              name="password"
              [(ngModel)]="user.password" 
              required 
              class="w-full pl-4 pr-12 py-3 rounded-lg bg-slate-900 border border-slate-700 focus:border-amber-400 focus:ring-1 focus:ring-amber-400 text-slate-100 placeholder-slate-500 outline-none transition-all text-sm"
              placeholder="••••••••"
            >
            <button 
              type="button"
              (click)="showPassword = !showPassword"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-amber-400 focus:outline-none transition-colors"
              aria-label="Toggle password visibility"
            >
              <!-- Eye Icon when password is hidden -->
              <svg *ngIf="!showPassword" class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
              <!-- Eye-off Icon when password is visible -->
              <svg *ngIf="showPassword" class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
              </svg>
            </button>
          </div>
        </div>
      </div>

      <div>
        <label for="role" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">I am registering as a</label>
        <select 
          id="role" 
          name="role"
          [(ngModel)]="user.role"
          class="w-full px-4 py-3 rounded-lg bg-slate-900 border border-slate-700 focus:border-amber-400 focus:ring-1 focus:ring-amber-400 text-slate-100 outline-none transition-all text-sm"
        >
          <option value="MEMBER">Gym Member</option>
          <option value="TRAINER">Fitness Trainer</option>
        </select>
      </div>

      <!-- Trainer Specific Section -->
      <div *ngIf="user.role === 'TRAINER'" class="p-4 rounded-lg bg-slate-900/50 border border-slate-800 space-y-4">
        <h3 class="text-xs font-bold text-amber-400 uppercase tracking-wider">Trainer Credentials</h3>
        
        <div>
          <label for="specialization" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Specialization</label>
          <input 
            type="text" 
            id="specialization" 
            name="specialization"
            [(ngModel)]="user.specialization"
            required
            class="w-full px-4 py-3 rounded-lg bg-slate-900 border border-slate-700 focus:border-amber-400 focus:ring-1 focus:ring-amber-400 text-slate-100 placeholder-slate-500 outline-none transition-all text-sm"
            placeholder="Zumba, Bodybuilding, Yoga"
          >
        </div>

        <div>
          <label for="experienceYears" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Experience (Years)</label>
          <input 
            type="number" 
            id="experienceYears" 
            name="experienceYears"
            [(ngModel)]="user.experienceYears"
            required
            min="0"
            class="w-full px-4 py-3 rounded-lg bg-slate-900 border border-slate-700 focus:border-amber-400 focus:ring-1 focus:ring-amber-400 text-slate-100 outline-none transition-all text-sm"
          >
        </div>
      </div>

      <button 
        type="submit" 
        [disabled]="!signupForm.form.valid || loading"
        class="w-full py-3 rounded-lg btn-gold font-bold transition-all flex items-center justify-center gap-2 text-sm disabled:opacity-50 disabled:cursor-not-allowed"
      >
        <svg *ngIf="loading" class="animate-spin h-5 w-5 text-slate-950" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span>{{ loading ? 'Creating Account...' : 'Register Now' }}</span>
      </button>
    </form>

    <div class="mt-8 text-center border-t border-slate-800 pt-6">
      <p class="text-slate-400 text-xs">
        Already have an account? 
        <a routerLink="/login" class="text-amber-400 hover:text-amber-300 font-semibold transition-all">Sign In</a>
      </p>
    </div>
  </div>
</div>
